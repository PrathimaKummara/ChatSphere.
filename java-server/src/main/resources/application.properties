# Application Config
spring.application.name=chatsphere-server
server.port=5000

# MySQL Config
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:chatsphere}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Auto Table Creation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# MongoDB Config
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/chatsphere}

# Email Config (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:your_email_user_here}
spring.mail.password=${EMAIL_PASS:your_email_app_password_here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Secret
jwt.secret=${JWT_SECRET:chatsphere_secure_jwt_secret_key_2026_spring_node}

# Socket.IO Config
socketio.host=0.0.0.0
socketio.port=5001

# Serve Uploads Statically Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
